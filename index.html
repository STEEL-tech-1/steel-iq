<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NZD — Structural Studio Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #0a0c0f;
  --ink2: #13181f;
  --ink3: #1c2330;
  --rule: #232c3a;
  --rule2: #2e3a4a;
  --steel: #3d4f63;
  --mist: #6b7f96;
  --fog: #98aab8;
  --paper: #c8d4de;
  --white: #eef2f6;
  --amber: #f0a000;
  --amber2: rgba(240,160,0,0.12);
  --red: #e84040;
  --red2: rgba(232,64,64,0.12);
  --green: #2ec27e;
  --green2: rgba(46,194,126,0.10);
  --blue: #4aa3f5;
  --blue2: rgba(74,163,245,0.10);
  --purple: #a78bfa;
  --r: 6px;
  --font-display: 'Bebas Neue', sans-serif;
  --font-body: 'IBM Plex Sans', sans-serif;
  --font-mono: 'IBM Plex Mono', monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:var(--ink);color:var(--white);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--rule2);border-radius:3px}

/* ── LAYOUT ── */
#app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;min-width:220px;background:var(--ink2);border-right:1px solid var(--rule);display:flex;flex-direction:column;overflow-y:auto}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* ── SIDEBAR ── */
.logo{padding:18px 16px 14px;border-bottom:1px solid var(--rule)}
.logo-mark{font-family:var(--font-display);font-size:28px;letter-spacing:2px;color:var(--amber);line-height:1}
.logo-sub{font-size:9px;color:var(--mist);letter-spacing:2px;text-transform:uppercase;margin-top:2px;font-family:var(--font-mono)}
.nav-section{padding:14px 12px 4px;font-size:9px;color:var(--steel);letter-spacing:2px;text-transform:uppercase;font-family:var(--font-mono)}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 14px;margin:1px 6px;border-radius:var(--r);cursor:pointer;font-size:13px;color:var(--fog);transition:all .15s;font-weight:400;position:relative}
.nav-item:hover{background:var(--ink3);color:var(--white)}
.nav-item.active{background:var(--amber2);color:var(--amber);border-left:2px solid var(--amber)}
.nav-item.active{padding-left:12px}
.nav-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;font-family:var(--font-mono);font-size:10px;background:var(--ink3);color:var(--mist);padding:1px 6px;border-radius:3px}
.nav-badge.hot{background:var(--red2);color:var(--red)}
.sidebar-bottom{margin-top:auto;padding:12px;border-top:1px solid var(--rule)}
.capacity-label{font-size:9px;color:var(--mist);letter-spacing:1px;text-transform:uppercase;font-family:var(--font-mono);margin-bottom:6px}
.cap-bar-wrap{height:4px;background:var(--rule2);border-radius:2px;overflow:hidden;margin-bottom:4px}
.cap-bar{height:100%;background:var(--amber);border-radius:2px;transition:width .5s}
.cap-bar.over{background:var(--red)}
.cap-meta{font-size:10px;color:var(--fog);font-family:var(--font-mono)}

/* ── TOPBAR ── */
.topbar{height:50px;background:var(--ink2);border-bottom:1px solid var(--rule);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0}
.topbar-title{font-family:var(--font-display);font-size:22px;letter-spacing:1.5px;color:var(--white);flex:1}
.search-box{background:var(--ink3);border:1px solid var(--rule2);border-radius:var(--r);padding:6px 12px;font-size:12px;color:var(--white);width:200px;outline:none;font-family:var(--font-body);transition:border-color .15s}
.search-box::placeholder{color:var(--steel)}
.search-box:focus{border-color:var(--amber)}
.btn{padding:6px 14px;border-radius:var(--r);border:none;cursor:pointer;font-size:12px;font-weight:600;font-family:var(--font-body);transition:all .15s;letter-spacing:.3px}
.btn-amber{background:var(--amber);color:var(--ink)}
.btn-amber:hover{background:#e09500}
.btn-ghost{background:var(--ink3);color:var(--fog);border:1px solid var(--rule2)}
.btn-ghost:hover{color:var(--white);border-color:var(--rule)}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-danger{background:var(--red2);color:var(--red);border:1px solid var(--red)}
.btn-success{background:var(--green2);color:var(--green);border:1px solid var(--green)}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto;padding:20px}

/* ── CARDS / STATS ── */
.stats-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:20px}
.stat{background:var(--ink2);border:1px solid var(--rule);border-radius:var(--r);padding:14px 12px;position:relative;overflow:hidden}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--line-color,var(--amber))}
.stat-val{font-family:var(--font-display);font-size:30px;letter-spacing:1px;line-height:1;margin-bottom:2px}
.stat-lbl{font-size:10px;color:var(--mist);letter-spacing:1px;text-transform:uppercase;font-family:var(--font-mono)}
.stat-sub{font-size:10px;color:var(--fog);margin-top:4px}

/* ── TABLES ── */
.panel{background:var(--ink2);border:1px solid var(--rule);border-radius:var(--r);overflow:hidden}
.panel-header{padding:12px 16px;border-bottom:1px solid var(--rule);display:flex;align-items:center;gap:8px}
.panel-title{font-family:var(--font-display);font-size:16px;letter-spacing:1px;flex:1}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{text-align:left;padding:8px 12px;font-size:9px;font-weight:600;color:var(--steel);letter-spacing:1.5px;text-transform:uppercase;border-bottom:1px solid var(--rule);font-family:var(--font-mono);background:var(--ink3);white-space:nowrap}
.tbl td{padding:9px 12px;border-bottom:1px solid var(--rule);vertical-align:middle;color:var(--paper)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--ink3)}
.tbl tr.clickable{cursor:pointer}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:600;font-family:var(--font-mono);letter-spacing:.3px;white-space:nowrap}
.badge-on-track{background:var(--green2);color:var(--green)}
.badge-delayed{background:var(--red2);color:var(--red)}
.badge-not-started{background:var(--rule);color:var(--mist)}
.badge-complete{background:rgba(74,163,245,.15);color:var(--blue)}
.badge-production{background:rgba(167,139,250,.15);color:var(--purple)}
.badge-job{background:var(--amber2);color:var(--amber)}
.badge-quote{background:var(--blue2);color:var(--blue)}
.badge-high{background:var(--red2);color:var(--red)}
.badge-medium{background:var(--amber2);color:var(--amber)}
.badge-low{background:var(--green2);color:var(--green)}
.badge-n1{background:rgba(74,163,245,.12);color:var(--blue)}
.badge-n2{background:rgba(240,160,0,.12);color:var(--amber)}
.badge-n3{background:rgba(167,139,250,.12);color:var(--purple)}

/* ── PROGRESS ── */
.prog-wrap{height:4px;background:var(--rule2);border-radius:2px;overflow:hidden;min-width:60px}
.prog-fill{height:100%;border-radius:2px;transition:width .5s}

/* ── MEMBER AVATAR ── */
.av{display:inline-flex;align-items:center;justify-content:center;border-radius:50%;font-weight:600;flex-shrink:0;font-family:var(--font-mono)}
.av-sm{width:24px;height:24px;font-size:9px}
.av-md{width:32px;height:32px;font-size:11px}
.av-lg{width:44px;height:44px;font-size:14px}

/* ── BOARD ── */
.board-wrap{display:flex;gap:14px;overflow-x:auto;padding-bottom:10px}
.board-col{min-width:260px;max-width:260px;background:var(--ink2);border:1px solid var(--rule);border-radius:var(--r);display:flex;flex-direction:column}
.col-hd{padding:12px 14px;border-bottom:1px solid var(--rule);display:flex;align-items:center;gap:8px}
.col-hd-title{font-family:var(--font-display);font-size:14px;letter-spacing:1px;flex:1}
.col-cnt{font-size:10px;background:var(--ink3);color:var(--steel);padding:1px 6px;border-radius:3px;font-family:var(--font-mono)}
.col-dot{width:8px;height:8px;border-radius:50%}
.col-cards{padding:8px;display:flex;flex-direction:column;gap:6px;flex:1}
.job-card{background:var(--ink3);border:1px solid var(--rule2);border-radius:5px;padding:11px;cursor:pointer;transition:all .15s}
.job-card:hover{border-color:var(--amber);box-shadow:0 2px 12px rgba(240,160,0,.1)}
.job-card-title{font-size:12px;font-weight:500;line-height:1.4;margin-bottom:7px;color:var(--white)}
.job-card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.job-card-team{font-size:10px;color:var(--mist);font-family:var(--font-mono);margin-left:auto}
.add-col-btn{margin:6px 8px 8px;padding:7px;border-radius:4px;background:transparent;border:1px dashed var(--rule2);color:var(--steel);font-size:11px;cursor:pointer;text-align:center;transition:all .15s;font-family:var(--font-body)}
.add-col-btn:hover{border-color:var(--amber);color:var(--amber)}

/* ── CHECKLIST PROGRESS ── */
.check-grid{display:flex;gap:3px;flex-wrap:wrap}
.check-cell{width:16px;height:16px;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:900}
.check-done{background:var(--green2);color:var(--green)}
.check-partial{background:var(--amber2);color:var(--amber)}
.check-todo{background:var(--rule2);color:var(--steel)}

/* ── TEAM GRID ── */
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.member-card{background:var(--ink2);border:1px solid var(--rule);border-radius:var(--r);padding:16px;transition:all .15s;cursor:pointer}
.member-card:hover{border-color:var(--amber);transform:translateY(-2px)}
.member-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.member-name{font-weight:600;font-size:13px}
.member-role{font-size:10px;color:var(--mist);font-family:var(--font-mono);margin-top:1px}
.member-load{display:flex;gap:10px;margin-bottom:8px}
.load-stat{text-align:center;flex:1}
.load-stat .n{font-family:var(--font-display);font-size:22px;line-height:1}
.load-stat .l{font-size:9px;color:var(--mist);text-transform:uppercase;letter-spacing:1px}
.overloaded{color:var(--red)}
.available{color:var(--green)}

/* ── TIMELINE ── */
.tl-wrap{overflow-x:auto}
.tl-grid{display:grid}
.tl-hd{display:flex;border-bottom:1px solid var(--rule)}
.tl-name-hd{min-width:240px;padding:8px 12px;font-size:9px;color:var(--steel);font-family:var(--font-mono);letter-spacing:1.5px;text-transform:uppercase;border-right:1px solid var(--rule);flex-shrink:0}
.tl-week-hd{flex:1;min-width:50px;text-align:center;font-size:9px;color:var(--steel);padding:8px 2px;font-family:var(--font-mono);border-right:1px solid var(--rule)}
.tl-row{display:flex;align-items:center;border-bottom:1px solid var(--rule);min-height:38px}
.tl-row:hover{background:var(--ink3)}
.tl-row-name{min-width:240px;padding:6px 12px;font-size:11px;font-weight:500;border-right:1px solid var(--rule);display:flex;align-items:center;gap:6px;flex-shrink:0;overflow:hidden}
.tl-bar-area{flex:1;position:relative;height:38px;display:flex;align-items:center}
.tl-bar{height:18px;border-radius:3px;position:absolute;display:flex;align-items:center;padding:0 6px;font-size:9px;font-weight:600;color:#0a0c0f;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;transition:filter .15s;font-family:var(--font-mono)}
.tl-bar:hover{filter:brightness(1.15)}

/* ── MODALS ── */
.overlay{position:fixed;inset:0;background:rgba(5,8,12,.8);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
.overlay.hidden{display:none}
.modal{background:var(--ink2);border:1px solid var(--rule2);border-radius:10px;width:580px;max-width:95vw;max-height:88vh;overflow-y:auto;box-shadow:0 30px 80px rgba(0,0,0,.7)}
.modal-lg{width:720px}
.modal-hd{padding:18px 22px;border-bottom:1px solid var(--rule);display:flex;align-items:center;gap:10px}
.modal-title{font-family:var(--font-display);font-size:20px;letter-spacing:1px;flex:1}
.modal-close{background:var(--ink3);border:none;color:var(--fog);width:26px;height:26px;border-radius:4px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.modal-close:hover{background:var(--red2);color:var(--red)}
.modal-body{padding:18px 22px}
.modal-footer{padding:14px 22px;border-top:1px solid var(--rule);display:flex;justify-content:flex-end;gap:8px}

/* ── FORMS ── */
.fg{margin-bottom:14px}
.fl{font-size:10px;font-weight:600;color:var(--fog);margin-bottom:5px;display:block;letter-spacing:.8px;text-transform:uppercase;font-family:var(--font-mono)}
.fi,.fs,.ft{width:100%;background:var(--ink3);border:1px solid var(--rule2);border-radius:var(--r);padding:8px 10px;font-size:13px;color:var(--white);outline:none;font-family:var(--font-body);transition:border-color .15s}
.fi:focus,.fs:focus,.ft:focus{border-color:var(--amber)}
.ft{min-height:70px;resize:vertical}
.fs option{background:var(--ink3)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

/* ── SECTION CHECKLIST ── */
.section-checks{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.sch-item{display:flex;align-items:center;gap:5px;background:var(--ink3);border:1px solid var(--rule2);border-radius:4px;padding:4px 8px;font-size:11px;cursor:pointer;transition:all .15s;font-family:var(--font-mono)}
.sch-item.done{background:var(--green2);border-color:var(--green);color:var(--green)}
.sch-item.done::before{content:'✓ '}
.sch-item:not(.done){color:var(--mist)}
.sch-item:not(.done)::before{content:'○ '}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;right:20px;background:var(--ink3);border:1px solid var(--rule2);border-radius:6px;padding:10px 16px;font-size:12px;font-weight:500;z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,.5);display:flex;align-items:center;gap:8px;transform:translateY(60px);opacity:0;transition:all .3s;font-family:var(--font-mono)}
.toast.show{transform:translateY(0);opacity:1}

/* ── MISC ── */
.divider{border:none;border-top:1px solid var(--rule);margin:16px 0}
.tag{font-size:9px;padding:2px 6px;border-radius:2px;font-family:var(--font-mono);font-weight:600}
.flex{display:flex;align-items:center}
.gap6{gap:6px}
.gap10{gap:10px}
.ml-auto{margin-left:auto}
.text-mist{color:var(--mist)}
.text-mono{font-family:var(--font-mono)}
.bold{font-weight:600}
.section-row{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.section-head{font-family:var(--font-display);font-size:18px;letter-spacing:1px}
.pn{font-size:10px;color:var(--mist);font-family:var(--font-mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:280px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.detail-field label{font-size:9px;color:var(--mist);font-family:var(--font-mono);letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:3px}
.detail-field span{font-size:13px;color:var(--white)}
</style>
</head>
<body>
<div id="app">
<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">
    <div class="logo-mark">NZD</div>
    <div class="logo-sub">Structural Studio</div>
  </div>
  <div class="nav-section">Views</div>
  <div class="nav-item active" data-view="dashboard" onclick="nav('dashboard')"><span class="nav-icon">⊞</span>Dashboard</div>
  <div class="nav-item" data-view="jobs" onclick="nav('jobs')"><span class="nav-icon">◈</span>Job Stage<span class="nav-badge" id="nb-jobs">0</span></div>
  <div class="nav-item" data-view="quotes" onclick="nav('quotes')"><span class="nav-icon">◎</span>Quote Stage<span class="nav-badge" id="nb-quotes">0</span></div>
  <div class="nav-item" data-view="co" onclick="nav('co')"><span class="nav-icon">△</span>Change Orders<span class="nav-badge" id="nb-co">0</span></div>
  <div class="nav-item" data-view="mailtask" onclick="nav('mailtask')"><span class="nav-icon">✉</span>Mail Tasks<span class="nav-badge" id="nb-mail">0</span></div>
  <div class="nav-section">Resources</div>
  <div class="nav-item" data-view="team" onclick="nav('team')"><span class="nav-icon">◉</span>Team & Capacity</div>
  <div class="nav-item" data-view="timeline" onclick="nav('timeline')"><span class="nav-icon">⊟</span>Schedule</div>
  <div class="nav-item" data-view="completed" onclick="nav('completed')"><span class="nav-icon">✓</span>Completed<span class="nav-badge" id="nb-done">0</span></div>
  <div class="sidebar-bottom">
    <div class="capacity-label">Studio Capacity</div>
    <div class="cap-bar-wrap"><div class="cap-bar" id="studio-cap-bar" style="width:0%"></div></div>
    <div class="cap-meta" id="studio-cap-meta">—</div>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div class="topbar-title" id="page-title">DASHBOARD</div>
    <input class="search-box" placeholder="Search projects…" oninput="globalSearch(this.value)"/>
    <button class="btn btn-ghost btn-sm" onclick="openJobModal()">+ Job</button>
    <button class="btn btn-amber btn-sm" onclick="openQuoteModal()">+ Quote</button>
  </div>
  <div class="content" id="main-content"></div>
</div>
</div>

<!-- JOB MODAL -->
<div class="overlay hidden" id="job-modal">
<div class="modal">
  <div class="modal-hd">
    <div class="modal-title" id="jm-title">NEW JOB</div>
    <button class="modal-close" onclick="closeModal('job-modal')">✕</button>
  </div>
  <div class="modal-body">
    <div class="fg"><label class="fl">Project Name *</label><input class="fi" id="jm-name" placeholder="e.g. S-25-001 - Address, City, TX"/></div>
    <div class="fg"><label class="fl">Job Number</label><input class="fi" id="jm-num" placeholder="PN-26-001"/></div>
    <div class="form-row">
      <div class="fg"><label class="fl">Stage</label>
        <select class="fs" id="jm-stage"><option>PRODUCTION</option><option>JOB</option></select></div>
      <div class="fg"><label class="fl">Priority</label>
        <select class="fs" id="jm-priority"><option value="">—</option><option>High</option><option>Medium</option><option>Low</option></select></div>
    </div>
    <div class="form-row">
      <div class="fg"><label class="fl">Assigned Team</label>
        <select class="fs" id="jm-team"><option value="">—</option><option>N1</option><option>N2</option><option>N3</option></select></div>
      <div class="fg"><label class="fl">Assigned Person</label>
        <select class="fs" id="jm-person"></select></div>
    </div>
    <div class="form-row">
      <div class="fg"><label class="fl">Start Date</label><input class="fi" type="date" id="jm-start"/></div>
      <div class="fg"><label class="fl">End Date</label><input class="fi" type="date" id="jm-end"/></div>
    </div>
    <div class="fg"><label class="fl">Revision</label><input class="fi" id="jm-rev" placeholder="R1"/></div>
    <div class="fg"><label class="fl">Remarks</label><textarea class="ft" id="jm-remarks" placeholder="Notes…"></textarea></div>
    <hr class="divider"/>
    <div class="fl">Checklist Progress (%)</div>
    <div class="form-row3">
      <div class="fg"><label class="fl">FrameCAD</label><input class="fi" id="jm-framecad" type="number" min="0" max="100" placeholder="0"/></div>
      <div class="fg"><label class="fl">Detailer</label><input class="fi" id="jm-detailer" type="number" min="0" max="100" placeholder="0"/></div>
      <div class="fg"><label class="fl">City Permit</label><input class="fi" id="jm-permit" type="number" min="0" max="100" placeholder="0"/></div>
    </div>
    <div class="form-row3">
      <div class="fg"><label class="fl">RFY</label><input class="fi" id="jm-rfy" type="number" min="0" max="100" placeholder="0"/></div>
      <div class="fg"><label class="fl">GFC</label><input class="fi" id="jm-gfc" type="number" min="0" max="100" placeholder="0"/></div>
      <div class="fg"><label class="fl">BOQ</label><input class="fi" id="jm-boq" type="number" min="0" max="100" placeholder="0"/></div>
    </div>
    <div class="fg"><label class="fl">Status</label>
      <select class="fs" id="jm-status"><option value="">—</option><option>ON TRACK</option><option>DELAYED</option><option>NOT STARTED</option><option>COMPLETE</option></select></div>
  </div>
  <div class="modal-footer">
    <button class="btn btn-ghost btn-sm" onclick="closeModal('job-modal')">Cancel</button>

<script>
// ═══════════════ API CONFIG ═══════════════
const API = window.location.origin; // same host as server.py

async function apiFetch(path, method='GET', body=null){
  const opts = { method, headers:{'Content-Type':'application/json'} };
  if(body) opts.body = JSON.stringify(body);
  const r = await fetch(API + path, opts);
  if(!r.ok){ const t=await r.text(); console.error(path, r.status, t); throw new Error(t); }
  return r.json();
}
const apiGet  = p       => apiFetch(p);
const apiPost = (p,b)   => apiFetch(p,'POST',b);
const apiPut  = (p,b)   => apiFetch(p,'PUT',b);
const apiDel  = p       => apiFetch(p,'DELETE');

// ═══════════════ DATA (loaded from DB) ═══════════════
let TEAMS   = {};
let MEMBERS = [];

let jobs = [];
let quotes = [];
let cos = [];
let mailTasks = [];
let completed = [];

let currentView = 'dashboard';
let editingItem = null;
let editingType = null;

// ═══════════════ UTILS ═══════════════
const memberByInit = (init) => MEMBERS.find(m=>m.id===init)||MEMBERS.find(m=>m.name.toLowerCase().includes((init||'').toLowerCase()));
const memberColor = (init) => {const m=memberByInit(init); return m?m.color:'#555'};
const memberName = (init) => {const m=memberByInit(init); return m?m.name:init||'—'};

function av(init,size='sm'){
  const m=memberByInit(init);
  const col=m?m.color:'#444';
  const i=m?m.id:init;
  return `<div class="av av-${size}" style="background:${col}20;color:${col};border:1px solid ${col}40">${i||'?'}</div>`;
}
function statusBadge(s){
  const m={'ON TRACK':'badge-on-track','DELAYED':'badge-delayed','NOT STARTED':'badge-not-started','COMPLETE':'badge-complete','COMPLETED':'badge-complete'};
  return s?`<span class="badge ${m[s]||'badge-not-started'}">${s}</span>`:'<span class="badge badge-not-started">—</span>';
}
function priorityBadge(p){
  const m={'High':'badge-high','Medium':'badge-medium','Low':'badge-low'};
  return p?`<span class="badge ${m[p]||''}">${p}</span>`:'';
}
function stageBadge(s){
  const m={'PRODUCTION':'badge-production','JOB':'badge-job','QUOTE':'badge-quote'};
  return s?`<span class="badge ${m[s]||'badge-not-started'}">${s}</span>`:'';
}
function teamBadge(t){
  const m={'N1':'badge-n1','N2':'badge-n2','N3':'badge-n3'};
  return t?`<span class="badge ${m[t]||''}">${t}</span>`:'';
}
function pct(vals){
  const v=vals.filter(x=>x>0);
  return v.length?Math.round(v.reduce((a,b)=>a+b,0)/vals.length):0;
}
function progBar(val,color='#f0a000'){
  return `<div style="display:flex;align-items:center;gap:6px"><div class="prog-wrap" style="width:60px"><div class="prog-fill" style="width:${val}%;background:${color}"></div></div><span style="font-size:10px;font-family:var(--font-mono);color:var(--mist)">${val}%</span></div>`;
}
function checklist(items){
  return items.map(([lbl,val])=>{
    const cls=val>=100?'check-done':val>0?'check-partial':'check-todo';
    return `<div class="check-cell ${cls}" title="${lbl}: ${val}%">${val>=100?'✓':val>0?'~':''}</div>`;
  }).join('');
}
function formatDate(d){
  if(!d)return '—';
  try{return new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'2-digit'})}catch{return d}
}
function toast(msg,icon='✓'){
  document.getElementById('tm').textContent=msg;
  document.getElementById('ti').textContent=icon;
  const el=document.getElementById('toast');
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2600);
}
function openModal(id){document.getElementById(id).classList.remove('hidden')}
function closeModal(id){document.getElementById(id).classList.add('hidden')}

// ═══════════════ NAV ═══════════════
function nav(view){
  currentView=view;
  document.querySelectorAll('.nav-item').forEach(el=>{
    el.classList.toggle('active',el.dataset.view===view);
  });
  const titles={dashboard:'DASHBOARD',jobs:'JOB STAGE',quotes:'QUOTE STAGE',co:'CHANGE ORDERS',mailtask:'MAIL TASKS',team:'TEAM & CAPACITY',timeline:'SCHEDULE',completed:'COMPLETED'};
  document.getElementById('page-title').textContent=titles[view]||view.toUpperCase();
  render();
  updateBadges();
}

function updateBadges(){
  document.getElementById('nb-jobs').textContent=jobs.length;
  document.getElementById('nb-quotes').textContent=quotes.length;
  document.getElementById('nb-co').textContent=cos.length;
  document.getElementById('nb-mail').textContent=mailTasks.length;
  document.getElementById('nb-done').textContent=completed.length;
  // capacity
  const totalLimit=MEMBERS.reduce((a,m)=>a+m.limit,0);
  const totalUsed=MEMBERS.reduce((a,m)=>a+m.used,0);
  const pctCap=Math.min(Math.round(totalUsed/totalLimit*100),120);
  const bar=document.getElementById('studio-cap-bar');
  bar.style.width=Math.min(pctCap,100)+'%';
  bar.className='cap-bar'+(pctCap>100?' over':'');
  document.getElementById('studio-cap-meta').textContent=`${totalUsed}/${totalLimit} active tasks`;
}

// ═══════════════ RENDER ═══════════════
function render(){
  const v=currentView;
  if(v==='dashboard') renderDashboard();
  else if(v==='jobs') renderJobs();
  else if(v==='quotes') renderQuotes();
  else if(v==='co') renderCO();
  else if(v==='mailtask') renderMailTask();
  else if(v==='team') renderTeam();
  else if(v==='timeline') renderTimeline();
  else if(v==='completed') renderCompleted();
}

// ─── DASHBOARD ───
function renderDashboard(){
  const delayed=jobs.filter(j=>j.status==='DELAYED').length+quotes.filter(q=>q.status==='DELAYED').length;
  const onTrack=jobs.filter(j=>j.status==='ON TRACK').length+quotes.filter(q=>q.status==='ON TRACK').length;
  const highPri=jobs.filter(j=>j.priority==='High').length+quotes.filter(q=>q.priority==='High').length;
  const overloaded=MEMBERS.filter(m=>m.used>m.limit).length;

  document.getElementById('main-content').innerHTML=`
    <div class="stats-grid">
      <div class="stat" style="--line-color:#4aa3f5"><div class="stat-val" style="color:#4aa3f5">${quotes.length}</div><div class="stat-lbl">Quotes Active</div></div>
      <div class="stat" style="--line-color:#f0a000"><div class="stat-val" style="color:#f0a000">${jobs.length}</div><div class="stat-lbl">Jobs Active</div></div>
      <div class="stat" style="--line-color:#a78bfa"><div class="stat-val" style="color:#a78bfa">${cos.length}</div><div class="stat-lbl">Change Orders</div></div>
      <div class="stat" style="--line-color:#2ec27e"><div class="stat-val" style="color:#2ec27e">${onTrack}</div><div class="stat-lbl">On Track</div></div>
      <div class="stat" style="--line-color:#e84040"><div class="stat-val" style="color:#e84040">${delayed}</div><div class="stat-lbl">Delayed</div></div>
      <div class="stat" style="--line-color:#e84040"><div class="stat-val" style="color:${overloaded>0?'#e84040':'#2ec27e'}">${overloaded}</div><div class="stat-lbl">Overloaded</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px">
      ${Object.entries(TEAMS).map(([key,t])=>{
        const tjobs=jobs.filter(j=>j.team===key);
        const tquotes=quotes.filter(q=>q.team===key);
        const delayed2=tjobs.filter(j=>j.status==='DELAYED').length;
        return `<div class="panel">
          <div class="panel-header" style="border-left:3px solid ${t.color}">
            <div class="panel-title" style="color:${t.color}">${t.label}</div>
            <span style="font-size:10px;color:var(--mist);font-family:var(--font-mono)">SPOC: ${t.spoc}</span>
          </div>
          <div style="padding:12px 14px">
            <div style="display:flex;gap:16px;margin-bottom:10px">
              <div class="load-stat"><div class="n" style="color:${t.color}">${tjobs.length}</div><div class="l">Jobs</div></div>
              <div class="load-stat"><div class="n" style="color:#4aa3f5">${tquotes.length}</div><div class="l">Quotes</div></div>
              <div class="load-stat"><div class="n" style="color:${delayed2>0?'#e84040':'#2ec27e'}">${delayed2}</div><div class="l">Delayed</div></div>
            </div>
            <div style="font-size:10px;color:var(--mist);font-family:var(--font-mono);margin-bottom:6px">Members</div>
            <div style="display:flex;gap:4px;flex-wrap:wrap">
              ${t.members.map(m=>{const mb=MEMBERS.find(x=>x.name===m||x.name.includes(m));return mb?`<div title="${mb.name}" class="av av-sm" style="background:${mb.color}20;color:${mb.color};border:1px solid ${mb.color}40">${mb.id}</div>`:''}).join('')}
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>
    <div style="display:grid;grid-template-columns:1.3fr 1fr;gap:16px">
      <div class="panel">
        <div class="panel-header"><div class="panel-title">ACTIVE JOBS</div><button class="btn btn-ghost btn-sm" onclick="nav('jobs')">View All</button></div>
        <table class="tbl">
          <thead><tr><th>Project</th><th>Team</th><th>Status</th><th>Progress</th></tr></thead>
          <tbody>
          ${jobs.slice(0,7).map(j=>{
            const p=pct([j.framecad,j.detailer,j.permit,j.rfy,j.gfc,j.boq]);
            const col=j.status==='DELAYED'?'#e84040':j.status==='ON TRACK'?'#2ec27e':'#f0a000';
            return `<tr class="clickable" onclick="showJobDetail(${j.id})">
              <td><div class="pn" title="${j.name}">${j.name}</div></td>
              <td>${teamBadge(j.team)}</td>
              <td>${statusBadge(j.status)}</td>
              <td>${progBar(p,col)}</td>
            </tr>`;
          }).join('')}
          </tbody>
        </table>
      </div>
      <div class="panel">
        <div class="panel-header"><div class="panel-title">RESOURCE LOAD</div></div>
        <div style="padding:10px 14px">
          ${MEMBERS.slice(0,8).map(m=>{
            const avail=1-(m.used/m.limit);
            const over=m.used>m.limit;
            const col=over?'#e84040':avail<0.3?'#f0a000':'#2ec27e';
            return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
              <div class="av av-sm" style="background:${m.color}20;color:${m.color};border:1px solid ${m.color}40">${m.id}</div>
              <div style="flex:1;min-width:0">
                <div style="font-size:11px;font-weight:500;margin-bottom:3px">${m.name.split(' ')[0]}</div>
                <div class="prog-wrap"><div class="prog-fill" style="width:${Math.min(m.used/m.limit*100,100)}%;background:${col}"></div></div>
              </div>
              <div style="font-size:10px;font-family:var(--font-mono);color:${col};min-width:40px;text-align:right">${m.used}/${m.limit}</div>
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>`;
}

// ─── JOB STAGE ───
function renderJobs(){
  document.getElementById('main-content').innerHTML=`
    <div style="display:flex;gap:8px;margin-bottom:14px;align-items:center">
      <div class="section-row" style="margin-bottom:0;flex:1">
        ${['','PRODUCTION','JOB'].map(s=>`<button class="btn btn-ghost btn-sm" onclick="filterJobs('${s}')">${s||'All'} (${s?jobs.filter(j=>j.stage===s).length:jobs.length})</button>`).join('')}
        ${['','ON TRACK','DELAYED','NOT STARTED'].map(s=>`<button class="btn btn-ghost btn-sm" onclick="filterJobsStatus('${s}')">${s||'All Status'}</button>`).join('')}
      </div>
      <button class="btn btn-amber btn-sm" onclick="openJobModal()">+ New Job</button>
    </div>
    <div class="panel">
      <table class="tbl" id="jobs-table">
        <thead><tr>
          <th>JOB#</th><th style="min-width:220px">Project</th><th>Stage</th><th>Team</th>
          <th>Person</th><th>Priority</th><th>Start</th><th>End</th>
          <th>FrameCAD</th><th>Detailer</th><th>Permit</th><th>RFY</th><th>GFC</th><th>BOQ</th>
          <th>%</th><th>Status</th><th></th>
        </tr></thead>
        <tbody>${jobRows(jobs)}</tbody>
      </table>
    </div>`;
}

function jobRows(list){
  return list.map(j=>{
    const p=pct([j.framecad,j.detailer,j.permit,j.rfy,j.gfc,j.boq]);
    const col=p>=80?'#2ec27e':p>=40?'#f0a000':'#e84040';
    return `<tr class="clickable" onclick="showJobDetail(${j.id})">
      <td><span style="font-family:var(--font-mono);font-size:10px;color:var(--mist)">${j.num||'—'}</span></td>
      <td><div class="pn" style="max-width:220px" title="${j.name}">${j.name}</div></td>
      <td>${stageBadge(j.stage)}</td>
      <td>${teamBadge(j.team)}</td>
      <td><div style="display:flex;align-items:center;gap:5px">${av(j.person)}<span style="font-size:11px">${j.person||'—'}</span></div></td>
      <td>${priorityBadge(j.priority)}</td>
      <td style="font-size:11px;font-family:var(--font-mono);color:var(--mist)">${formatDate(j.start)}</td>
      <td style="font-size:11px;font-family:var(--font-mono);color:var(--mist)">${formatDate(j.end)}</td>
      <td><span style="font-size:11px;font-family:var(--font-mono);color:${j.framecad>=100?'#2ec27e':j.framecad>0?'#f0a000':'var(--steel)'}">${j.framecad||0}%</span></td>
      <td><span style="font-size:11px;font-family:var(--font-mono);color:${j.detailer>=100?'#2ec27e':j.detailer>0?'#f0a000':'var(--steel)'}">${j.detailer||0}%</span></td>
      <td><span style="font-size:11px;font-family:var(--font-mono);color:${j.permit>=100?'#2ec27e':j.permit>0?'#f0a000':'var(--steel)'}">${j.permit||0}%</span></td>

function updateCapacity(id, field, val){
  const m=MEMBERS.find(x=>x.id===id);
  if(!m)return;
  const updated={...m, lim:m.limit, [field === 'limit' ? 'lim' : field]: Math.max(0,parseInt(val)||0)};
  apiPut(`/api/members/${id}`, updated)
    .then(()=>{ loadAll(); toast(`${field==='used'?'Used':'Limit'} updated`,'◈'); })
    .catch(()=>toast('Update failed','⚠'));
}

function saveMember(){
  const name=document.getElementById('mm2-name').value.trim();
  const mid=document.getElementById('mm2-id').value.trim().toUpperCase();
  if(!name||!mid){toast('Name and ID required','⚠');return;}
  const data={
    id:mid, name,
    role:document.getElementById('mm2-role').value.trim()||'Engineer',
    dept:document.getElementById('mm2-dept').value,
    lim:parseInt(document.getElementById('mm2-limit').value)||5,
    used:parseInt(document.getElementById('mm2-used').value)||0,
    color:document.getElementById('mm2-color').value,
    team:document.getElementById('mm2-team').value,
  };
  closeModal('member-modal');
  const req = editingMemberId
    ? apiPut(`/api/members/${editingMemberId}`, data).then(()=>toast('Member updated','✎'))
    : apiPost('/api/members', data).then(()=>toast('Member added','◉'));
  req.then(()=>loadAll()).catch(()=>toast('Save failed','⚠'));

  apiDel(`/api/members/${id}`)
    .then(()=>{ toast('Member removed','✕'); loadAll(); })
    .catch(()=>toast('Delete failed','⚠'));
}

  const barColors={'N1':'#4aa3f5','N2':'#f0a000','N3':'#a78bfa'};

  const allItems=[
    ...jobs.filter(j=>j.start).map(j=>({...j,_type:'JOB'})),
    ...quotes.filter(q=>q.start).map(q=>({...q,_type:'QUOTE'})),
  ];

  const placed=jobs.slice(0,14).map((j,i)=>({...j,_type:'JOB',_offset:i*5,_width:Math.max(10,15+Math.random()*25)}));

  document.getElementById('main-content').innerHTML=`

          ${weeks.slice(0,16).map(w=>`<div class="tl-week-hd">${w}</div>`).join('')}
        </div>
      </div>
      ${placed.map(j=>{
        const col=barColors[j.team]||'#888';
        const leftPct=Math.min(j._offset,85);
        const widPct=Math.max(8,j._width);
        return `<div class="tl-row" onclick="showJobDetail(${j.id})" style="cursor:pointer">

  document.getElementById('page-title').textContent=`SEARCH: "${q}"`;
  document.getElementById('main-content').innerHTML=`
    <div style="margin-bottom:16px">
      <div class="section-row"><div class="section-head">JOBS (${jl.length})</div></div>

    </div>
    <div>

      ${ql.length?`<div class="panel"><table class="tbl"><thead><tr><th>Project</th><th>Team</th><th>Status</th></tr></thead><tbody>${ql.map(q=>`<tr class="clickable" onclick="showQuoteDetail(${q.id})"><td class="pn">${q.name}</td><td>${teamBadge(q.team)}</td><td>${statusBadge(q.status)}</td></tr>`).join('')}</tbody></table></div>`:'<div style="color:var(--mist);font-size:12px;padding:10px">None found.</div>'}

// ═══════════════ INIT — Load from API ═══════════════
async function loadAll(){
  try {
    const data = await apiGet('/api/all');
    // Teams: array → object keyed by key
    TEAMS = {};
    (data.teams||[]).forEach(t => { TEAMS[t.key] = t; });
    // Members: map DB column 'lim' → 'limit'
    MEMBERS = (data.members||[]).map(m => ({...m, limit: m.lim ?? m.limit ?? 5}));
    jobs      = data.jobs      || [];
    quotes    = data.quotes    || [];
    cos       = data.change_orders || [];
    mailTasks = data.mail_tasks|| [];
    completed = data.completed || [];
    updateBadges();
    render();
  } catch(e) {
    document.getElementById('main-content').innerHTML=`
      <div style="padding:40px;text-align:center;color:var(--red);font-family:var(--font-mono)">
        <div style="font-size:18px;margin-bottom:10px">⚠ Cannot connect to backend</div>
        <div style="font-size:12px;color:var(--mist)">Make sure server.py is running on port 8000</div>
        <div style="font-size:11px;color:var(--steel);margin-top:8px">python3 server.py</div>
      </div>`;
  }
}
loadAll();
</script>
